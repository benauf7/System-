<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تحليل البيانات</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-4">
  <h2>لوحة التحليل</h2>
  <div class="row">
    <div class="col-md-6"><canvas id="salesChart"></canvas></div>
    <div class="col-md-6"><canvas id="topProductsChart"></canvas></div>
  </div>
  <div class="row mt-4">
    <div class="col-md-6"><h4>المنتجات منخفضة المخزون</h4><ul id="lowStockList" class="list-group"></ul></div>
    <div class="col-md-6"><h4>ملخص سريع</h4><div id="summary"></div></div>
  </div>
</div>
<script>
  async function loadCharts() {
    const salesRes = await fetch('/api/reports/sales-overview');
    const sales = await salesRes.json();
    const productsRes = await fetch('/api/reports/top-products');
    const topProducts = await productsRes.json();

    new Chart(document.getElementById('salesChart'), {
      type: 'line',
      data: { labels: sales.map(s => s.month), datasets: [{ label: 'إجمالي المبيعات', data: sales.map(s => s.total_sales) }] }
    });
    new Chart(document.getElementById('topProductsChart'), {
      type: 'bar',
      data: { labels: topProducts.map(p => p.name), datasets: [{ label: 'كمية مباعة', data: topProducts.map(p => p.total_sold) }] }
    });

    const lowStock = await (await fetch('/api/reports/low-stock')).json();
    const list = document.getElementById('lowStockList');
    list.innerHTML = lowStock.map(p => `<li class="list-group-item">${p.name} - الكمية: ${p.quantity}</li>`).join('');

    const summary = await (await fetch('/api/reports/summary')).json();
    document.getElementById('summary').innerHTML = `<p>عدد الفواتير: ${summary.invoice_count}</p><p>إجمالي الإيرادات: ${summary.total_revenue}</p>`;
  }
  loadCharts();
</script>
</body>
</html>
