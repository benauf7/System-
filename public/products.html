<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المنتجات</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2>إدارة المنتجات</h2>
  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#productModal" onclick="clearForm()">+ إضافة منتج</button>
  <table class="table table-bordered" id="productsTable">
    <thead>
      <tr><th>ID</th><th>الاسم</th><th>SKU</th><th>السعر</th><th>الكمية</th><th>إجراءات</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>بيانات المنتج</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="productId">
        <input type="text" id="name" class="form-control mb-2" placeholder="الاسم">
        <input type="text" id="sku" class="form-control mb-2" placeholder="SKU">
        <input type="number" id="price" class="form-control mb-2" placeholder="السعر">
        <input type="number" id="quantity" class="form-control mb-2" placeholder="الكمية">
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="saveProduct()">حفظ</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  async function loadProducts() {
    const res = await fetch('/api/products');
    const products = await res.json();
    const tbody = document.querySelector('#productsTable tbody');
    tbody.innerHTML = '';
    products.forEach(p => {
      tbody.innerHTML += `<tr>
        <td>${p.id}</td><td>${p.name}</td><td>${p.sku}</td><td>${p.price}</td><td>${p.quantity}</td>
        <td><button class="btn btn-sm btn-warning" onclick="editProduct(${p.id})">تعديل</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">حذف</button></td>
      </tr>`;
    });
  }
  window.editProduct = async (id) => {
    const res = await fetch('/api/products');
    const products = await res.json();
    const p = products.find(p => p.id == id);
    document.getElementById('productId').value = p.id;
    document.getElementById('name').value = p.name;
    document.getElementById('sku').value = p.sku;
    document.getElementById('price').value = p.price;
    document.getElementById('quantity').value = p.quantity;
    new bootstrap.Modal(document.getElementById('productModal')).show();
  };
  window.saveProduct = async () => {
    const id = document.getElementById('productId').value;
    const data = {
      name: document.getElementById('name').value,
      sku: document.getElementById('sku').value,
      price: parseFloat(document.getElementById('price').value),
      quantity: parseInt(document.getElementById('quantity').value)
    };
    if (id) {
      await fetch(`/api/products/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    } else {
      await fetch('/api/products', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    }
    bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
    loadProducts();
  };
  window.deleteProduct = async (id) => {
    if(confirm('حذف المنتج؟')) await fetch(`/api/products/${id}`, { method: 'DELETE' });
    loadProducts();
  };
  window.clearForm = () => {
    document.getElementById('productId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('sku').value = '';
    document.getElementById('price').value = '';
    document.getElementById('quantity').value = '';
  };
  loadProducts();
</script>
</body>
</html>
